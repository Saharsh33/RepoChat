<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RepoChat — Talk to Your Codebase</title>
    <meta name="description" content="RepoChat: AI-powered chat interface to explore and understand GitHub repositories using RAG and Groq." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="login-modal" class="modal-overlay" style="display: none;">
      <div class="modal-content">
        <div class="logo" style="justify-content: center; margin-bottom: 24px;">
          <span class="logo-text" style="font-size: 24px;">RepoChat</span>
        </div>

        <div style="display: flex; gap: 10px; margin-bottom: 16px;">
          <button id="toggle-login" style="flex: 1; padding: 8px; border-bottom: 2px solid var(--accent-primary);">Login</button>
          <button id="toggle-signup" style="flex: 1; padding: 8px; border-bottom: 2px solid transparent; color: var(--text-muted);">Sign Up</button>
        </div>
        
        <form id="auth-form">
          <input type="text" id="auth-username" placeholder="Username" required style="margin-bottom: 12px;"/>
          <input type="password" id="auth-password" placeholder="Password" required style="margin-bottom: 12px;"/>
          <button type="submit" id="auth-btn" style="width: 100%;">Login</button>
        </form>
        
        <p id="auth-error" style="color: var(--error); font-size: 13px; margin-top: 10px; display: none; text-align: center;"></p>

        <div style="text-align: center; margin: 16px 0; color: var(--text-muted); font-size: 12px;">OR</div>
        
        <button id="google-auth-btn" style="width: 100%; padding: 12px; background: white; color: black; border-radius: 8px; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 8px;">
          <img src="https://www.svgrepo.com/show/475656/google-color.svg" width="18" alt="Google">
          Continue with Google
        </button>
      </div>
    </div>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
