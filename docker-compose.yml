services:

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend

  backend:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - vector_db:/app/vector_db
      - huggingface_cache:/root/.cache/huggingface
    environment:
      PYTHONPATH: /app
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/ragdb
      GROQ_API_KEY: ${GROQ_API_KEY}
      REPOCHAT_API_KEY: ${REPOCHAT_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build: .
    command: celery -A worker.tasks worker --loglevel=info --concurrency=1
    volumes:
      - .:/app
      - vector_db:/app/vector_db
      - huggingface_cache:/root/.cache/huggingface
    environment:
      PYTHONPATH: /app
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/ragdb
      GROQ_API_KEY: ${GROQ_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ragdb
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    ports:
      - "6379:6379"
volumes:
  huggingface_cache:
  vector_db: